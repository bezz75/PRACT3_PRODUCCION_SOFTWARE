name: CI - Pruebas y Validación de Código

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Instalar uv
      uses: astral-sh/setup-uv@v2

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Instalar dependencias con uv
      run: |
        uv sync

    - name: Comprobar errores en el código (lint con ruff)
      run: |
        uv run ruff check .

    - name: Comprobar formato del código (ruff format)
      run: |
        uv run ruff format --check .

    - name: Verificar tipos con mypy
      run: |
        uv run mypy .

    - name: Ejecutar tests unitarios
      run: |
        uv run pytest core/tests/unit/ -v

    - name: Ejecutar tests de integración
      run: |
        uv run pytest core/tests/integration/ -v

    - name: Ejecutar tests de BDD
      run: |
        uv run behave core/tests/behaviour/
